name: Release

# Publishes a versioned, rollback-able Docker image to GitHub Container
# Registry. Two triggers:
#   - push of a `v*` tag (the normal release path: `git tag v1.2.3 && git
#     push origin v1.2.3`)
#   - workflow_dispatch (manual re-run, e.g. to republish an image after a
#     registry outage, without cutting a new tag)
#
# The `test` job mirrors ci.yml's gate (type check, no-console lint, keyless
# test suite, build) so a broken tag/dispatch can never publish a broken
# image — `publish` has a hard `needs: test` dependency and will not run if
# it fails. This intentionally duplicates ci.yml's steps rather than
# depending on a ci.yml run for this ref/SHA (workflow_dispatch has no
# associated PR/push CI run to depend on, and tag-push CI runs are a
# separate, not-guaranteed-synchronous workflow run) — see CLAUDE.md file
# ownership: this file must not edit ci.yml.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Enforce no console.* under server/
        run: "! grep -rn 'console\\.' server --include='*.ts'"

      - name: Run tests (keyless — analysis-only posture)
        run: npm test

      - name: Metamorphic scoring gate
        run: npm run test:metamorphic

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: "test-key-ci"

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # On a tag push, VERSION is the tag with its leading "v" stripped
      # (v1.2.3 -> 1.2.3). On workflow_dispatch (no tag ref), fall back to
      # the package.json version so a manual re-publish still gets a
      # meaningful, non-"unknown" tag rather than failing or defaulting to
      # something misleading.
      - name: Compute release version and commit SHA
        id: meta
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Image name is lowercased explicitly: ghcr.io requires a lowercase
      # repository path, but ${{ github.repository_owner }}/${{ github.repository }}
      # is not guaranteed lowercase (org/user names can have mixed case).
      - name: Compute lowercase image name
        id: image
        run: echo "name=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ steps.meta.outputs.sha }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
