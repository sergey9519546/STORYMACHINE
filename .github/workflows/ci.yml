name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      # Mechanical enforcement of CLAUDE.md's "no console.* under server/**"
      # rule — a written convention only reliably holds when CI holds it.
      # grep exits 1 on no-match, so `!` inverts: any hit fails the build
      # and prints the offending lines.
      - name: Enforce no console.* under server/
        run: "! grep -rn 'console\\.' server --include='*.ts'"

      # Documentation quality check: scan markdown files for AI writing patterns
      # Uses avoid-ai-writing Tier 1 patterns (25 high-confidence markers)
      # Non-blocking (warnings only) to avoid false positives on legitimate usage
      - name: Check documentation quality
        run: npm run check-docs
        continue-on-error: true

      # Deliberately NO GEMINI_API_KEY here: the product's official keyless
      # analysis-only mode is what CI must prove. With a fake key set, the
      # "keyless" degradation paths construct a real client and attempt live
      # HTTPS calls to the AI provider (passing only because failures degrade)
      # — a flake source, an outbound network dependency, and a posture the
      # suite was never meant to test. The full suite passes keyless.
      - name: Run tests (keyless — analysis-only posture)
        run: npm test

      # Hard metamorphic invariants must hold; empty_verbosity is a known-failing
      # witness (verbosity bias) and does not fail this step — see
      # evals/scoring/runner/metamorphic-lib.ts + docs/scoring/VERBOSITY_BIAS_2026-07-11.md.
      - name: Metamorphic scoring gate
        run: npm run test:metamorphic

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: "test-key-ci"
