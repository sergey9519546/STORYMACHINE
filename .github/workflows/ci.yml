name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      # Mechanical enforcement of CLAUDE.md's "no console.* under server/**"
      # rule — a written convention only reliably holds when CI holds it.
      # grep exits 1 on no-match, so `!` inverts: any hit fails the build
      # and prints the offending lines.
      #
      # --exclude-dir/--exclude mirror the tsconfig.json + package.json test
      # quarantine of the never-compiled v5.0 experimental "narrative OS"
      # subsystem (server/nvm/{kernel,quantum,research,infinity-gate}, plus
      # server/planning and every *.bench.ts under server/nvm/**/benchmarks)
      # and its two broken ai-provider tests (reference removed exports) —
      # none of it is wired into the running server, so it isn't held to the
      # logger convention either. Genuinely-live code stays covered.
      - name: Enforce no console.* under server/
        run: >-
          ! grep -rn 'console\.' server --include='*.ts'
          --exclude-dir=kernel --exclude-dir=quantum --exclude-dir=research
          --exclude-dir=infinity-gate --exclude-dir=planning --exclude-dir=benchmarks
          --exclude=ai-provider.test.ts --exclude=ai-provider-integration.test.ts

      # G0-08: user-facing honesty string audit — fails the build on
      # overclaim language ("Hollywood gold standard", "provably", stale
      # hardcoded rule/corpus counts, unverified superlatives, etc.) in the
      # shipped surface. See scripts/honesty-audit.mjs for scope and rules.
      - name: Honesty string audit
        run: npm run honesty-audit

      # Deliberately NO GEMINI_API_KEY here: the product's official keyless
      # analysis-only mode is what CI must prove. With a fake key set, the
      # "keyless" degradation paths construct a real client and attempt live
      # HTTPS calls to the AI provider (passing only because failures degrade)
      # — a flake source, an outbound network dependency, and a posture the
      # suite was never meant to test. The full suite passes keyless.
      - name: Run tests (keyless — analysis-only posture)
        run: npm test

      # Hard metamorphic invariants must hold; empty_verbosity is a known-failing
      # witness (verbosity bias) and does not fail this step — see
      # evals/scoring/runner/metamorphic-lib.ts + docs/scoring/VERBOSITY_BIAS_2026-07-11.md.
      - name: Metamorphic scoring gate
        run: npm run test:metamorphic

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: "test-key-ci"
